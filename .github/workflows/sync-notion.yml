name: Sync catalogo desde Notion
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sincronizar catalogo
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          curl -s "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"filter":{"property":"Activo","checkbox":{"equals":true}}}' \
          | jq '[.results[] | {
              id: .id,
              nombre: (.properties.Nombre.title[0].plain_text // ""),
              precio: (.properties.Precio.number // 0),
              color: (.properties.Color.rich_text[0].plain_text // ""),
              etiqueta: (.properties.Etiqueta.select.name // ""),
              sku: (.properties.SKU.rich_text[0].plain_text // ""),
              descripcion: (.properties.Descripcion.rich_text[0].plain_text // ""),
              activo: (.properties.Activo.checkbox // false)
            }]' > catalog.json
          echo "Productos sincronizados: $(jq length catalog.json)"
      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "sync: actualizar catalog.json desde Notion [skip ci]"
                  git pull --rebase origin main
          git push
